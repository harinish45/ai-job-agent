services:
  - type: web
    name: ai-job-agent-api
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobagent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: jobagent-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: ai-job-agent-worker
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobagent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: jobagent-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: ai-job-agent-api
          envVarKey: ENCRYPTION_KEY
      - key: SECRET_KEY
        fromService:
          type: web
          name: ai-job-agent-api
          envVarKey: SECRET_KEY

  - type: worker
    name: ai-job-agent-beat
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.core.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobagent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: jobagent-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: ai-job-agent-api
          envVarKey: ENCRYPTION_KEY
      - key: SECRET_KEY
        fromService:
          type: web
          name: ai-job-agent-api
          envVarKey: SECRET_KEY

databases:
  - name: jobagent-db
    databaseName: jobagent
    user: jobagent
    plan: starter

redis:
  - name: jobagent-redis
    plan: starter
    ipAllowList: []
